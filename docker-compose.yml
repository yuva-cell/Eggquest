services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - questhub-net

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/questhub
      - JWT_SECRET=${JWT_SECRET:-questhub_secret_change_me_in_production}
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - questhub-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - questhub-net

networks:
  questhub-net:
    driver: bridge

volumes:
  mongo_data:
